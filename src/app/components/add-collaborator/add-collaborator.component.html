<div class="sidebar-overlay" (click)="onClose()"></div>
<div class="sidebar-container">
    <header class="sidebar-header">
        <h2>Adicionar Colaborador</h2>
        <button class="close-btn" (click)="onClose()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </header>

    <div class="sidebar-content">
        <form [formGroup]="collaboratorForm" (ngSubmit)="onSubmit()">
            <div class="form-field">
                <label for="name">Nome</label>
                <input id="name" type="text" formControlName="name" placeholder="Nome do colaborador"
                    (input)="onInputChange()">
                <div *ngIf="collaboratorForm.get('name')?.invalid && collaboratorForm.get('name')?.touched"
                    class="field-error">
                    Nome é obrigatório
                </div>
            </div>

            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" placeholder="Email do colaborador"
                    (input)="onInputChange()">
                <div *ngIf="collaboratorForm.get('email')?.invalid && collaboratorForm.get('email')?.touched"
                    class="field-error">
                    <span *ngIf="collaboratorForm.get('email')?.errors?.['required']">Email é obrigatório</span>
                    <span *ngIf="collaboratorForm.get('email')?.errors?.['email']">Email inválido</span>
                </div>
            </div>

            <div class="form-field">
                <label>Tipo</label>
                <div class="type-selector">
                    <button type="button" class="type-option"
                        [class.selected]="collaboratorForm.get('type')?.value === 'recruiter'"
                        (click)="collaboratorForm.patchValue({type: 'recruiter'}); onInputChange()">
                        <strong>Recrutador</strong>
                        <small>Pode cadastrar usuários nos cursos</small>
                    </button>
                    <button type="button" class="type-option"
                        [class.selected]="collaboratorForm.get('type')?.value === 'editor'"
                        (click)="collaboratorForm.patchValue({type: 'editor'}); onInputChange()">
                        <strong>Editor</strong>
                        <small>Pode criar e editar conteúdos</small>
                    </button>
                </div>
            </div>

            <div class="form-field">
                <label>Modo de criação</label>
                <div class="mode-selector">
                    <label class="mode-radio">
                        <input type="radio" formControlName="creationMode" value="invite">
                        <span>Link de convite</span>
                        <small>Colaborador define a própria senha</small>
                    </label>
                    <label class="mode-radio">
                        <input type="radio" formControlName="creationMode" value="direct">
                        <span>Criar diretamente</span>
                        <small>Você define a senha agora</small>
                    </label>
                </div>
            </div>

            <div class="form-field" *ngIf="!isInviteMode">
                <label for="password">Senha</label>
                <input id="password" type="password" formControlName="password" placeholder="Senha do colaborador"
                    (input)="onInputChange()">
                <small>Mínimo de 8 caracteres</small>
                <div *ngIf="collaboratorForm.get('password')?.invalid && collaboratorForm.get('password')?.touched"
                    class="field-error">
                    <span *ngIf="collaboratorForm.get('password')?.errors?.['minlength']">Senha deve ter pelo menos 8
                        caracteres</span>
                </div>
            </div>

            <div class="form-field" *ngIf="isRecruiterSelected && roles.length > 0">
                <label>Cursos que o recrutador pode gerenciar</label>
                <div class="roles-list">
                    <label class="role-checkbox" *ngFor="let role of roles">
                        <input type="checkbox" [checked]="selectedRoleIds.includes(role.id)"
                            (change)="toggleRole(role.id)">
                        <span>{{ role.name }}</span>
                    </label>
                </div>
            </div>

            <div class="form-field" *ngIf="inviteUrl">
                <label>Link de convite</label>
                <div class="invite-url-box">
                    <input type="text" [value]="inviteUrl" readonly>
                    <button type="button" class="btn-copy" (click)="copyInviteUrl()">Copiar</button>
                </div>
            </div>

            <div class="form-actions">
                <div *ngIf="error" class="error-message">{{ error }}</div>
                <div *ngIf="successMessage && !inviteUrl" class="success-message">{{ successMessage }}</div>
                <button type="submit" class="btn-submit" [disabled]="isLoading || collaboratorForm.invalid">
                    <span *ngIf="!isLoading">Salvar Colaborador</span>
                    <span *ngIf="isLoading" class="spinner"></span>
                </button>
            </div>
        </form>
    </div>
</div>
