<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Million Dash - Dashboard Ultra Rápido</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#667eea">
  <meta name="description" content="Dashboard moderno e ultra-rápido com Angular 19">
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- Performance Optimizations -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <!-- Critical CSS Inline -->
  <style>
    /* Critical above-the-fold styles */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
    }

    /* Loading spinner */
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0F0F0F;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      color: white;
      margin-top: 20px;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div class="loading-container" id="initial-loader">
    <div>
      <div class="spinner"></div>
    </div>
  </div>

  <app-root></app-root>

  <!-- Remove loading screen when app loads -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 300);
        }
      }, 1000);
    });
  </script>
</body>

</html>
